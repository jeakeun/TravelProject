<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 파비콘: public/assets/Favicon.png 필요. 없으면 src/assets/favicon/Favicon.png 를 public/assets/ 로 복사 -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/assets/Favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/Favicon.png" />
    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0fe7c7a264f9456db151ae55939175a2&libraries=services"></script>
    <script src="//t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
    <script>
      window.KAKAO_JS_KEY = '0fe7c7a264f9456db151ae55939175a2';
      (function initKakao() {
        if (window.Kakao && !window.Kakao.isInitialized()) {
          window.Kakao.init(window.KAKAO_JS_KEY);
        } else if (!window.Kakao) {
          setTimeout(initKakao, 100);
        }
      })();
    </script>
    <title>Travel Community</title>
  </head>
